<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenHands Prototypes</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #fff;
      padding: 40px 20px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      background: linear-gradient(90deg, #00d4ff, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle {
      color: #94a3b8;
      margin-bottom: 3rem;
      font-size: 1.1rem;
    }
    .prototypes {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .prototype-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 1.5rem;
      transition: all 0.3s ease;
      text-decoration: none;
      color: inherit;
    }
    .prototype-card:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: #7c3aed;
      transform: translateY(-2px);
    }
    .prototype-card h2 {
      font-size: 1.25rem;
      margin-bottom: 0.5rem;
      color: #00d4ff;
    }
    .prototype-card p {
      color: #94a3b8;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>OpenHands Prototypes</h1>
    <p class="subtitle">Browse available prototypes</p>
    
    <div class="prototypes">
      <a href="/prototype-plg-automations/wizard.html" class="prototype-card">
        <h2>PLG Automations Wizard</h2>
        <p>Product-led growth automation workflow wizard prototype</p>
      </a>
    </div>
  </div>
</body>
</html>
